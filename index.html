<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:Arial,sans-serif;}
header{position:sticky;top:0;background:#121b2c;padding:12px 18px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.header-top{display:flex;align-items:center;gap:10px;justify-content:space-between;}
header img{width:50px;height:50px;border-radius:10px}
header h1{font-size:22px;font-weight:bold;background:linear-gradient(270deg,#4ea1ff,#ff4ea1,#4effa1);background-size:600% 600%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:anim 6s ease infinite;margin:0}
@keyframes anim{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.category{margin:12px 0}
.category-header{display:flex;align-items:center;gap:10px;padding:0 10px;justify-content:space-between;}
.category-profile{width:36px;height:36px;border-radius:50%;object-fit:cover}
.category h2{margin:0;color:#4ea1ff;font-size:16px}
.media-row{display:flex;gap:10px;overflow-x:auto;padding:8px;scroll-behavior: smooth;}
.media-card{min-width:180px;background:#121b2c;border-radius:12px;overflow:hidden;box-shadow:0 3px 6px rgba(0,0,0,.5)}
.player iframe,.player video,.player img,.player audio{width:100%;height:150px;border:none;object-fit:cover}
.actions{display:flex;justify-content:space-around;padding:4px 0;flex-wrap:wrap}
.btn{background:#0044cc;color:white;padding:4px 6px;border-radius:6px;font-size:12px;text-decoration:none;cursor:pointer}
.btn:hover{background:#0066ff}
.share-btn{background:#25D366;color:#fff;padding:4px 6px;border-radius:6px;font-size:12px;text-decoration:none;margin-top:4px;display:inline-block;}
.annonce-bar{overflow-x:auto;background:#0e1524;margin-top:8px;padding:6px 0;white-space:nowrap}
.annonce-track{display:inline-flex;gap:6px}
.annonce-btn{background:#ff4ea1;color:#fff;border:none;padding:5px 10px;border-radius:18px;font-size:12px;cursor:pointer}

/* TICKER */
.ticker-wrapper{position:fixed;bottom:0;left:0;width:100%;background:#111;color:#fff;overflow:hidden;z-index:999;border-top:2px solid red;}
.ticker{display:inline-block;white-space:nowrap;padding-left:100%;animation:tickerMove 25s linear infinite;font-weight:bold;font-size:14px;}
@keyframes tickerMove{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* LIVE POPUP */
.live-popup{position:fixed;bottom:100px;right:18px;background:#222;padding:12px;border-radius:12px;color:#fff;z-index:9999;max-height:60vh;overflow-y:auto;display:none}
.live-popup button{display:block;width:100%;margin-bottom:6px;background:#0044cc;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;text-align:left}

/* BOUTONS FLOTTANTS */
.floating-btn{position:fixed;width:50px;height:50px;border-radius:50%;font-size:20px;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px #222;}
#liveBtn{bottom:18px;right:18px;background:red;color:#fff;}
#listBtn{bottom:78px;right:18px;background:#222;color:#fff;}
#subBtn{bottom:138px;right:18px;background:#222;color:#fff;}
#subBtn.active{background:green;color:#fff;}

/* OUVERT/FERMÉ */
.open-btn{padding:4px 8px;border-radius:6px;color:#fff;font-weight:bold;font-size:12px;animation:blink 1s infinite;}
.open-btn.open{background:green;}
.open-btn.closed{background:red;}
@keyframes blink{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}

/* HORLOGE ENTETE */
#clock{color:#fff;font-weight:bold;font-size:14px;}
</style>

    function updateOpenBtn() {
        const h = new Date().getHours();
        if(h>=OPEN_HOUR && h<CLOSE_HOUR){
            openBtn.innerText="OUVERT";
            openBtn.classList.add("open"); openBtn.classList.remove("closed");
        } else {

    }
    updateOpenBtn();
    setInterval(updateOpenBtn,1000);

    sec.innerHTML = `<div class="category-header">
        <img src="${cat.profile}" class="category-profile">
        <h2>${cat.title}</h2>
    </div>`;
    sec.querySelector(".category-header").appendChild(openBtn);

    const row = document.createElement("div"); row.className = "media-row";

        if(!m.url) return;
        const card = document.createElement("div"); card.className = "media-card";
        let player="";
        if(m.url.includes("youtube.com") || m.url.includes("youtu.be")){
            let id = m.url.includes("watch?v=") ? m.url.split("watch?v=")[1].split("&")[0] : m.url.split("youtu.be/")[1];
            player=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
        } else if(m.url.includes("facebook.com")){
            player=`<iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(m.url)}&show_text=false" allowfullscreen></iframe>`;
        } else if(m.url.includes("tiktok.com")){
            let embedUrl = m.url.replace("www.tiktok.com","www.tiktok.com/embed");
            player = `<iframe src="${embedUrl}" frameborder="0" allowfullscreen scrolling="no"></iframe>`;
        } else if(m.url.match(/\.(mp4|webm|ogg)$/i)){
            player = `<video controls><source src="${m.url}" type="video/mp4"></video>`;
        } else if(m.url.match(/\.(mp3|wav|opus)$/i)){
            player = `
            <div style="position:relative;width:100%;height:150px;">

// --- LIVE PLAYLIST ---
let LIVE_PLAYLIST=[];
CATEGORIES.forEach(cat=>{
    cat.medias.forEach(m=>{
        if(!m.url) return;
        let type="other";
        if(m.url.includes("youtube.com") || m.url.includes("youtu.be")) type="youtube";
        else if(m.url.includes("facebook.com")) type="facebook";
        else if(m.url.includes("tiktok.com")) type="tiktok";
        else if(m.url.match(/\.(mp4|webm|ogg)$/i)) type="mp4";
        else if(m.url.match(/\.(mp3|wav|opus)$/i)) type="mp3";
        else if(m.url.match(/\.(jpg|jpeg|png|gif|webp)$/i)) type="image";
        LIVE_PLAYLIST.push({title:m.title,type:type,url:m.url});
    });
});

let liveIndex=0;
let liveTimer=null;
function playLive(){
    const zone=document.getElementById("livePlayer");
    const item=LIVE_PLAYLIST[liveIndex];
    clearTimeout(liveTimer);
    if(!item) return;
    if(item.type==="image"){
        zone.innerHTML="";
        zone.style.backgroundImage=`url(${item.url})`;
        zone.style.backgroundSize="cover";
        zone.style.backgroundPosition="center";
    } else {
        zone.style.backgroundImage="none";
        if(item.type==="youtube"){
            let id=item.url.includes("watch?v=")?item.url.split("watch?v=")[1].split("&")[0]:item.url.split("youtu.be/")[1];
            zone.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
        } else if(item.type==="facebook"){
            zone.innerHTML=`<iframe width="100%" height="100%" src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(item.url)}&show_text=false&autoplay=true" allowfullscreen></iframe>`;
            liveTimer=setTimeout(nextLive,300000);
        } else if(item.type==="tiktok"){
            let embedUrl=item.url.replace("www.tiktok.com","www.tiktok.com/embed");
            zone.innerHTML=`<iframe width="100%" height="100%" src="${embedUrl}" frameborder="0" allowfullscreen scrolling="no"></iframe>`;
        } else if(item.type==="mp4"){
            zone.innerHTML=`<video width="100%" height="100%" autoplay controls onended="nextLive()"><source src="${item.url}" type="video/mp4"></video>`;
        } else if(item.type==="mp3" || item.type==="opus"){
            zone.innerHTML = `
            <div style="position:relative;width:100%;height:100%;">
                <img src="${DEFAULT_PROFILE}" alt="${item.title}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
                <audio controls autoplay style="position:absolute;bottom:12px;left:12px;width:calc(100% - 24px);">
                    <source src="${item.url}" type="audio/mpeg">
                </audio>
            </div>
            `;
        }
    }
}

function nextLive(){liveIndex=(liveIndex+1)%LIVE_PLAYLIST.length;playLive();}
function prevLive(){liveIndex=(liveIndex+LIVE_PLAYLIST.length)%LIVE_PLAYLIST.length;playLive();}
function openLiveTV(){document.getElementById("liveTV").style.display="block";playLive();}
function closeLiveTV(){document.getElementById("liveTV").style.display="none";clearTimeout(liveTimer);}

document.getElementById("liveBtn").onclick=openLiveTV;
document.getElementById("listBtn").onclick=function(){
    const livePopup=document.getElementById("livePopup");
    livePopup.style.display=livePopup.style.display==="block"?"none":"block";
    livePopup.innerHTML="";
    LIVE_PLAYLIST.forEach((item,i)=>{
        const btn=document.createElement("button");
        btn.innerText=item.title;
        btn.onclick=()=>{liveIndex=i;playLive();openLiveTV();}
        livePopup.appendChild(btn);
    });
};

// --- HORLOGE ---
function updateClock(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById("clock").innerText = `🕒 ${h}:${m}:${s}`;
}
setInterval(updateClock,1000);
updateClock();

// --- NOTIFICATIONS PERSISTANTES ---
const subBtn = document.getElementById("subBtn");
let subscribed = localStorage.getItem("btvSubscribed") === "true";
if(subscribed) subBtn.classList.add("active");

subBtn.onclick = () => {
    if(!subscribed){
        subscribed = true;
        localStorage.setItem("btvSubscribed","true");
        subBtn.classList.add("active");
        alert("✅ Vous êtes abonné aux notifications Business TV !");
        if(Notification.permission !== "granted"){
            Notification.requestPermission().then(p=>{
                if(p==="granted") startDailyNotifications();
            });
        } else startDailyNotifications();
    }
};

function sendNotification(){
    if(Notification.permission === "granted"){
        const notif = new Notification("Business TV", {
            body: "Aujourd'hui nous avons des nouveautés et des offres intéressantes ! Visitez-nous ici.",
            icon: DEFAULT_PROFILE,
            data: {url: SITE_LINK}
        });
        notif.onclick = function(e){
            e.preventDefault();
            window.open(this.data.url,"_blank");
        }
    }
}

let notificationTimer;
