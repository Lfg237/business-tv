<title>Business TV</title>
<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:Arial,sans-serif;}
header{position:sticky;top:0;background:#121b2c;padding:12px 18px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.header-top{display:flex;align-items:center;gap:10px;justify-content:space-between;}
header img{width:50px;height:50px;border-radius:10px;animation:logoAnim 6s ease infinite;}
@keyframes logoAnim{0%{transform:rotate(0deg)}50%{transform:rotate(10deg)}100%{transform:rotate(0deg)}}
header h1{font-size:22px;font-weight:bold;background:linear-gradient(270deg,#4ea1ff,#ff4ea1,#4effa1);background-size:600% 600%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:anim 6s ease infinite;margin:0}
@keyframes anim{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

/* Boutons annonces haut */
.annonce-bar{display:flex;gap:6px;overflow-x:auto;padding:6px 0;background:#0e1524;}
.annonce-btn{background:#ff4ea1;color:#fff;border:none;padding:6px 12px;border-radius:12px;font-size:12px;cursor:pointer;white-space:nowrap;}
.annonce-btn:hover{background:#ff77c0;}

/* Catégories et médias */
.category{margin:12px 0}
.category-header{display:flex;align-items:center;gap:10px;padding:0 10px;justify-content:space-between;}
.category-profile{width:36px;height:36px;border-radius:50%;object-fit:cover}
.category h2{margin:0;color:#4ea1ff;font-size:16px}
.media-row{display:flex;gap:10px;overflow-x:auto;scroll-behavior: smooth;padding:8px;}
.media-card{min-width:180px;background:#121b2c;border-radius:12px;overflow:hidden;box-shadow:0 3px 6px rgba(0,0,0,.5);}
.player iframe,.player video,.player img,.player audio{width:100%;height:150px;border:none;object-fit:cover;}
.actions{display:flex;justify-content:space-around;padding:2px 0;flex-wrap:wrap;}
.btn{background:#0044cc;color:white;padding:2px 4px;border-radius:6px;font-size:11px;text-decoration:none;cursor:pointer}
.btn:hover{background:#0066ff}
.share-btn{background:#25D366;color:#fff;padding:2px 4px;border-radius:6px;font-size:11px;text-decoration:none;margin-top:2px;display:inline-block;}
.actions-line{border-top:1px solid #333;margin-top:4px;}

/* TICKER / bande annonce en bas */
.ticker-wrapper{position:fixed;bottom:0;left:0;width:100%;background:#111;color:#fff;overflow:hidden;z-index:999;border-top:2px solid red;}
.ticker{display:inline-block;white-space:nowrap;padding-left:100%;animation:tickerMove 10s linear infinite;font-weight:bold;font-size:14px;}
@keyframes tickerMove{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* LIVE POPUP */
#liveTV{display:none;position:fixed;inset:0;background:#000;z-index:10000;}
#liveTV .live-header{height:50px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 12px;color:#fff;}
#livePlayer{width:100%;height:calc(100% - 50px);background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;}
#liveTV button{background:red;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}

/* BOUTONS FLOTTANTS */
.floating-btn{position:fixed;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px #222;}
#liveBtn{bottom:18px;right:18px;background:red;color:#fff;}
#listBtn{bottom:68px;right:18px;background:#222;color:#fff;}
#subBtn{bottom:118px;right:18px;background:#222;color:#fff;}
#jobBtn{bottom:168px;right:18px;background:orange;color:#fff;}
#subBtn.active{background:green;color:#fff;}

/* OUVERT/FERMÉ */
.open-btn{padding:2px 6px;border-radius:6px;color:#fff;font-weight:bold;font-size:11px;}
.open-btn.open{background:green;}
.open-btn.closed{background:red;}

/* Horloge */
#clock{color:#fff;font-weight:bold;font-size:14px;}

/* POPUP ANNONCE */

#annoncePopup div{background:#121b2c;padding:20px;border-radius:15px;width:90%;max-width:320px;text-align:center;}
#annoncePopup a{margin:0 5px;}

function updateClock(){
  const c=document.getElementById('clock');
  const d=new Date();
  c.innerText=d.toLocaleTimeString();
}

updateClock();

// --- POPUP ANNONCE ---
function openAnnonce(text,phone,whatsapp){
  document.getElementById('annonceText').innerText=text;
  document.getElementById('annonceCall').href="tel:"+phone;
  document.getElementById('annonceWA').href="https://wa.me/"+whatsapp+"?text="+encodeURIComponent(text);
  document.getElementById('annoncePopup').style.display="flex";
}
function closeAnnonce(){
  document.getElementById('annoncePopup').style.display="none";
}

// --- LIVE ---
let LIVE_PLAYLIST=[];
let liveIndex=0;
function prevLive(){ if(LIVE_PLAYLIST.length===0)return; liveIndex=(liveIndex-1+LIVE_PLAYLIST.length)%LIVE_PLAYLIST.length; playLive(); }
function nextLive(){ if(LIVE_PLAYLIST.length===0)return; liveIndex=(liveIndex+1)%LIVE_PLAYLIST.length; playLive(); }
function playLive(){
  if(LIVE_PLAYLIST.length===0) return;
  const lp=document.getElementById('livePlayer');
  const cur=LIVE_PLAYLIST[liveIndex];
  lp.innerHTML='';
  if(cur.type==='youtube'){
    lp.innerHTML=`<iframe src="https://www.youtube.com/embed/${cur.id||cur.url}" allowfullscreen></iframe>`;
  } else if(cur.type==='facebook'){
    lp.innerHTML=`<iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cur.url)}&show_text=false" allowfullscreen></iframe>`;
  } else if(cur.type==='mp4'){
    lp.innerHTML=`<video controls autoplay><source src="${cur.url}" type="video/mp4"></video>`;
  } else if(cur.type==='image'){
    lp.innerHTML=`<img src="${cur.url}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
  } else if(cur.type==='mp3'){
    lp.innerHTML=`<audio controls autoplay style="width:100%;"><source src="${cur.url}" type="audio/mpeg"></audio>`;
  }
}
function openLive(){ document.getElementById('liveTV').style.display='block'; playLive(); }
function closeLiveTV(){ document.getElementById('liveTV').style.display='none'; }

// --- RENDER CATEGORIES ---
function renderCategories(){
  const content=document.getElementById('content');
  CATEGORIES.forEach(cat=>{
    const div=document.createElement('div');
    div.className='category';
    div.innerHTML=`
      <div class="category-header">
        <img src="${cat.profile||DEFAULT_PROFILE}" class="category-profile">
        <h2>${cat.title}</h2>
      </div>
      <div class="media-row">
        ${cat.medias.map(m=>`
          <div class="media-card">
            <div class="player">${m.url.endsWith('.mp4')?`<video controls src="${m.url}"></video>`:
                                    m.url.endsWith('.mp3')?`<audio controls src="${m.url}"></audio>`:
                                    `<img src="${m.url}">`}</div>
            <div class="actions">
              <a class="btn" href="${m.url}" target="_blank">Voir</a>
              <a class="share-btn" href="https://wa.me/${cat.whatsapp}?text=${encodeURIComponent(m.title)}" target="_blank">WA</a>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    content.appendChild(div);
  });
}
