<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business TV</title>
<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:Arial,sans-serif;}
header{position:sticky;top:0;background:#121b2c;padding:12px 18px;z-index:1000}
.header-top{display:flex;align-items:center;gap:10px}
header img{width:50px;height:50px;border-radius:10px}
header h1{font-size:28px;font-weight:bold;background:linear-gradient(270deg,#4ea1ff,#ff4ea1,#4effa1);background-size:600% 600%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:anim 6s ease infinite}
@keyframes anim{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.category{margin:15px 0}
.category-header{display:flex;align-items:center;gap:10px;padding:0 10px}
.category-profile{width:40px;height:40px;border-radius:50%;object-fit:cover}
.category h2{margin:8px;color:#4ea1ff;font-size:18px}

.media-row{display:flex;gap:10px;overflow-x:auto;padding:8px;scroll-behavior: smooth;}
.media-card{min-width:200px;background:#121b2c;border-radius:12px;overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.6)}
.player iframe,.player video,.player img,.player audio{width:100%;height:120px;border:none;object-fit:cover}

.actions{display:flex;justify-content:space-around;padding:6px 0;flex-wrap:wrap}
.btn{background:#0044cc;color:white;padding:5px 8px;border-radius:8px;font-size:12px;text-decoration:none;cursor:pointer}
.btn:hover{background:#0066ff}

.share-btn{background:#25D366;color:#fff;padding:5px 8px;border-radius:8px;font-size:12px;text-decoration:none;margin-top:4px;display:inline-block;}

.annonce-bar{overflow-x:auto;background:#0e1524;margin-top:8px;padding:6px 0;white-space:nowrap}
.annonce-track{display:inline-flex;gap:6px}
.annonce-btn{background:#ff4ea1;color:#fff;border:none;padding:5px 10px;border-radius:18px;font-size:12px;cursor:pointer}

.ticker-wrapper{position:fixed;bottom:0;left:0;width:100%;background:#111;color:#fff;overflow:hidden;z-index:999999;border-top:2px solid red;}
.ticker{display:inline-block;white-space:nowrap;padding-left:100%;animation:tickerMove 10s linear infinite;font-weight:bold;font-size:14px;}
@keyframes tickerMove{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* LIVE POPUP */
.live-popup{position:fixed;bottom:100px;right:18px;background:#222;padding:12px;border-radius:12px;color:#fff;z-index:9999;max-height:60vh;overflow-y:auto;display:none}
.live-popup button{display:block;width:100%;margin-bottom:6px;background:#0044cc;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;text-align:left}

/* BOUTONS FLOTTANTS VERTICAUX */
.floating-btn{position:fixed;width:50px;height:50px;border-radius:50%;font-size:20px;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px #222;}
#liveBtn{bottom:18px;right:18px;background:red;color:#fff;}
#listBtn{bottom:78px;right:18px;background:#222;color:#fff;}
#subBtn{bottom:138px;right:18px;background:#222;color:#fff;}
#subBtn.active{background:green;color:#fff;}
</style>
</head>
<body>

<div id="fb-root"></div>
<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/fr_FR/sdk.js#xfbml=1&version=v19.0"></script>

<header>
<div class="ticker-wrapper"><div class="ticker">🔴 BUSINESS TV LIVE • Promotion gratuite • Contact WhatsApp 670035609 •</div></div>
<div class="header-top">
<img src="https://raw.githubusercontent.com/Lfg237/business-tv/main/Polish_20260210_113721977.png">
<h1>Business TV</h1>
</div>
<div class="annonce-bar">
<div class="annonce-track">
<button class="annonce-btn" data-text="📢 Promo Business TV" data-phone="237656050097" data-whatsapp="237670035609">📢 contact admin</button>
<button class="annonce-btn" data-text="🎬 Community manager & site web creation et gestion de page facebook" data-phone="237656050097" data-whatsapp="237670035609">🎬 community manager</button>
<button class="annonce-btn" data-text="💼 publier votre profil gratuitement pour les chercheurs d’emploi💋 ville de Yaoundé bibiche mveng 19 ans douer dans le service de restauration j'ai fait dans le marketing et aussi dans la vente ambulante habite à Ekounou tel:674 99 76 15" data-phone="237656050097" data-whatsapp="237670035609">💼 liste des chercheurs emploi</button>
</div>
</div>
</header>

<div id="content"></div>

<!-- LIVE PLAYER -->
<div id="liveTV" style="display:none;position:fixed;inset:0;background:#000;z-index:10000;">
<div style="height:50px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 12px;">
<strong style="color:red;">🔴 BUSINESS TV LIVE</strong>
<button onclick="closeLiveTV()" style="background:red;border:none;color:#fff;padding:6px 12px;border-radius:6px;">⬅ Accueil</button>
</div>
<div id="livePlayer" style="width:100%;height:calc(100% - 50px);"></div>
<div style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:20px;">
<button onclick="prevLive()">⏮ Précédent</button>
<button onclick="nextLive()">⏭ Suivant</button>
</div>
</div>

<div class="live-popup" id="livePopup"></div>

<!-- BOUTONS FLOTTANTS -->
<div id="liveBtn" class="floating-btn">▶</div>
<div id="listBtn" class="floating-btn">📋</div>
<div id="subBtn" class="floating-btn">🔔</div>

<!-- POPUP ANNONCES -->
<div id="annoncePopup" style="
position:fixed;inset:0;background:rgba(0,0,0,0.7);
display:none;align-items:center;justify-content:center;z-index:100000;">
  <div style="background:#121b2c;padding:20px;border-radius:15px;width:90%;max-width:320px;text-align:center;">
    <p id="annonceText" style="margin-bottom:15px;"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <a id="annonceCall" style="background:#0066ff;padding:8px 12px;border-radius:8px;text-decoration:none;color:white;">📞 Appeler</a>
      <a id="annonceWA" target="_blank" style="background:green;padding:8px 12px;border-radius:8px;text-decoration:none;color:white;">💬 WhatsApp</a>
    </div>
    <div style="margin-top:12px;">
      <button onclick="closeAnnonce()" style="background:red;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">❌ Fermer</button>
    </div>
  </div>
</div>

<script>
// ABONNEMENT
const subBtn = document.getElementById("subBtn");
let subscribed = false;
subBtn.onclick = () => {
  if(!subscribed){
    subscribed = true;
    subBtn.classList.add("active");
    alert("✅ Vous êtes abonné aux notifications Business TV !");
  }
};

// SITE LINK
const SITE_LINK = "https://business-tv.vercel.app/";
const DEFAULT_PROFILE="https://raw.githubusercontent.com/Lfg237/business-tv/main/Polish_20260210_113721977.png";

// CATEGORIES COMPLETES
const CATEGORIES=[
  {title:"B.TV Vente flash", profile:"https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260223_163236698.png", phone:"237656050097", whatsapp:"237670035609", medias:[
    {title:"vente rapide le flash du jour Reel 3",url:"https://www.facebook.com/reel/921053893432571/?app=fbl"},
    {title:"Image promo flash", url:"https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260223_163236698.png"}
  ]},
  {title:"B.TV La Kass", profile:DEFAULT_PROFILE, phone:"237656050097", whatsapp:"237670035609", medias:[
    {title:"Facebook Reel 1",url:"https://www.facebook.com/reel/936858412242126/?app=fbl"},
    {title:"Facebook Reel 2",url:"https://www.facebook.com/reel/659085228484377/?app=fbl"},
    {title:"YouTube Vidéo",url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
    {title:"MP4 Vidéo",url:"https://www.w3schools.com/html/mov_bbb.mp4"},
    {title:"Image La Kass", url:"https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260223_163236698.png"}
  ]},
  {title:"B.TV Vente Achat location automobile", profile:"https://via.placeholder.com/40x40.png?text=LN", phone:"237656050097", whatsapp:"237670035609", medias:[
    {title:"automobile et camion Reel 3",url:"https://www.facebook.com/reel/921053893432571/?app=fbl"}
  ]},
  {title:"B.TV Shopping", profile:"https://via.placeholder.com/40x40.png?text=LN", phone:"237656050097", whatsapp:"237670035609", medias:[
    {title:"Facebook Reel 4",url:"https://www.facebook.com/reel/307450755064294/?app=fbl"}
  ]},
  {title:"B.TV Lingerie Nyanga", profile:"https://raw.githubusercontent.com/Lfg237/m-dias/main/1771868982903.jpg", phone:"237656706241", whatsapp:"237656706241", medias:[
    {title:"lingerie nyanga Reel 5",url:"https://www.facebook.com/reel/1533470091048945/?app=fbl"},
    {title:"Image Lingerie", url:"https://raw.githubusercontent.com/Lfg237/m-dias/main/1772173574675.jpg"},
{title:"Image Lingerie", url:"https://raw.githubusercontent.com/Lfg237/m-dias/main/1772173625514.jpg"},
{title:"Image Lingerie", url:"https://raw.githubusercontent.com/Lfg237/m-dias/main/1772173672485.jpg"}
  ]},
  {title:"B.TV MP3 Podcast FM", profile:"https://raw.githubusercontent.com/Lfg237/d-p-t-image-Lesfacilitateurs-/main/InShot_20250612_144937066.jpg", phone:"237656050097", whatsapp:"237670035609", medias:[
    {title:"MP3 Audio Podcast",url:"https://raw.githubusercontent.com/Lfg237/m-dias/main/Cysoul-Mavini_Clip_Officiel_(256k).mp3"}
  ]}
];

// GENERATION DES CATEGORIES
const box = document.getElementById("content");
CATEGORIES.forEach(cat=>{
  const sec=document.createElement("section");
  sec.className="category";
  sec.innerHTML=`<div class="category-header">
    <img src="${cat.profile}" class="category-profile">
    <h2>${cat.title}</h2></div>`;
  const row=document.createElement("div"); row.className="media-row";

  cat.medias.forEach(m=>{
    const card=document.createElement("div"); card.className="media-card";
    let player="";
    if(m.url.includes("youtube")){
      const id = m.url.split("v=")[1]?.split("&")[0] || m.url.split("youtu.be/")[1];
      player=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
    }else if(m.url.includes("facebook")){
      player=`<iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(m.url)}&show_text=false&autoplay=true" allowfullscreen></iframe>`;
    }else if(m.url.endsWith(".mp4")){
      player=`<video controls autoplay><source src="${m.url}" type="video/mp4"></video>`;
    }else if(m.url.match(/\.(jpg|jpeg|png|gif)$/)){
      player=`<img src="${m.url}" alt="${m.title}">`;
    }else if(m.url.endsWith(".mp3")){
      player=`<audio controls autoplay><source src="${m.url}" type="audio/mpeg"></audio>`;
    }

    card.innerHTML=`<div class="player">${player}</div>
      <div class="actions">
        <a class="btn" target="_blank" href="${m.url}">▶ Lire</a>
        <a class="btn" href="tel:${cat.phone}">📞</a>
        <a class="btn" target="_blank" href="https://wa.me/${cat.whatsapp}?text=${encodeURIComponent('🔴 Regarde ce média sur Business TV: '+SITE_LINK+'#'+encodeURIComponent(m.title))}">💬 WhatsApp</a>
      </div>`;
    row.appendChild(card);
  });

  sec.appendChild(row);
  box.appendChild(sec);
});

// LIVE PLAYLIST
let LIVE_PLAYLIST=[];
CATEGORIES.forEach(cat=>{
  cat.medias.forEach(m=>{
    const type = m.url.includes("youtube")?"youtube":
                 m.url.includes("facebook")?"facebook":
                 m.url.endsWith(".mp4")?"mp4":"other";
    if(type!=="other") LIVE_PLAYLIST.push({title:m.title,type:type,url:m.url});
  });
});

let liveIndex=0;
let liveTimer=null;
function playLive(){
  const zone=document.getElementById("livePlayer");
  const item=LIVE_PLAYLIST[liveIndex];
  clearTimeout(liveTimer);
  if(!item){return;}
  if(item.type==="youtube"){
    const id = item.url.split("v=")[1]?.split("&")[0] || item.url.split("youtu.be/")[1];
    zone.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
  }else if(item.type==="facebook"){
    zone.innerHTML=`<iframe width="100%" height="100%" src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(item.url)}&show_text=false&autoplay=true" allowfullscreen></iframe>`;
    liveTimer=setTimeout(nextLive,300000);
  }else if(item.type==="mp4"){
    zone.innerHTML=`<video width="100%" height="100%" autoplay controls onended="nextLive()"><source src="${item.url}" type="video/mp4"></video>`;
  }
}
function nextLive(){liveIndex=(liveIndex+1)%LIVE_PLAYLIST.length;playLive();}
function prevLive(){liveIndex=(liveIndex-1+LIVE_PLAYLIST.length)%LIVE_PLAYLIST.length;playLive();}
function openLiveTV(){document.getElementById("liveTV").style.display="block";playLive();}
function closeLiveTV(){document.getElementById("liveTV").style.display="none";clearTimeout(liveTimer);}

// BOUTONS LIVE
document.getElementById("liveBtn").onclick=openLiveTV;
document.getElementById("listBtn").onclick=function(){
  const livePopup=document.getElementById("livePopup");
  livePopup.style.display = livePopup.style.display==="block"?"none":"block";
  livePopup.innerHTML="";
  LIVE_PLAYLIST.forEach((item,i)=>{
    const btn=document.createElement("button");
    btn.innerText=item.title;
    btn.onclick=()=>{liveIndex=i;playLive();openLiveTV();}
    livePopup.appendChild(btn);
  });
};

// POPUP ANNONCES
const annoncePopup = document.getElementById("annoncePopup");
const annonceText = document.getElementById("annonceText");
const annonceCall = document.getElementById("annonceCall");
const annonceWA = document.getElementById("annonceWA");
document.querySelectorAll(".annonce-btn").forEach(btn=>{
  btn.addEventListener("click", function(){
    const text=this.dataset.text;
    const phone=this.dataset.phone;
    const whatsapp=this.dataset.whatsapp;
    annonceText.innerText=text;
    annonceCall.href="tel:"+phone;
    annonceWA.href="https://wa.me/"+whatsapp+"?text="+encodeURIComponent(text+" 🔴 Voir sur Business TV: "+SITE_LINK);
    annoncePopup.style.display="flex";
  });
});
function closeAnnonce(){annoncePopup.style.display="none";}
</script>

</body>
</html>
