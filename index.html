// --- Helper pour détecter type de média ---
function detectType(url){
  if(url.includes("youtube")||url.includes("youtu.be")) return 'youtube';
  if(url.endsWith(".mp4")) return 'mp4';
  if(url.endsWith(".mp3")||url.endsWith(".opus")) return 'audio';
  if(url.endsWith(".jpg")||url.endsWith(".png")||url.endsWith(".jpeg")) return 'image';
  if(url.includes("facebook.com/reel")) return 'iframe';
  return 'iframe';
}

// --- Générer le contenu ---
function renderContent(){
  const container=document.getElementById('content');
  CATEGORIES.forEach(cat=>{
    // Ajouter au live playlist
  cat.medias.forEach(m => LIVE_PLAYLIST.push({url:m.url,type:detectType(m.url), title:m.title, category: cat.title}));

    const catDiv=document.createElement('div');catDiv.className='category';
    const header=document.createElement('div');header.className='category-header';
    const img=document.createElement('img');img.src=cat.profile;img.className='category-profile';
    const h2=document.createElement('h2');h2.innerText=cat.title;
    header.appendChild(img);header.appendChild(h2);catDiv.appendChild(header);

    const mediaRow=document.createElement('div');mediaRow.className='media-row';
    cat.medias.forEach(m=>{
      const card=document.createElement('div');card.className='media-card';
      const type=detectType(m.url);
      if(type==='image'){card.innerHTML=`<img src="${m.url}" alt="${m.title}">`;}
      else if(type==='mp4'){card.innerHTML=`<video controls src="${m.url}" style="width:100%;height:150px;"></video>`;}
      else if(type==='audio'){card.innerHTML=`<audio controls src="${m.url}" style="width:100%;"></audio>`;}
      else{card.innerHTML=`<iframe src="${m.url}" style="width:100%;height:150px;" allowfullscreen></iframe>`;}
      
      const actions=document.createElement('div');actions.className='actions';
      const btnPlay=document.createElement('button');btnPlay.className='btn';btnPlay.innerText='▶ Live';
      btnPlay.onclick=()=>{liveIndex=LIVE_PLAYLIST.findIndex(lp=>lp.url===m.url);openLive();}
      const btnWA=document.createElement('a');btnWA.className='share-btn';
      btnWA.href="https://wa.me/"+cat.whatsapp+"?text="+encodeURIComponent("Regarder "+m.title);btnWA.target="_blank";btnWA.innerText='💬 WhatsApp';
      actions.appendChild(btnPlay);actions.appendChild(btnWA);
      card.appendChild(actions);
      mediaRow.appendChild(card);
    });
    catDiv.appendChild(mediaRow);
    container.appendChild(catDiv);
  });
}
renderContent();

    categoriesMap[m.category].push({index: i, title: m.title});
  });

  // On crée le DOM
  Object.keys(categoriesMap).forEach(catTitle => {
    const catHeader = document.createElement('h3');
    catHeader.innerText = catTitle;
    catHeader.style.color = '#4ea1ff';
    listContent.appendChild(catHeader);

    categoriesMap[catTitle].forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerText = item.title || 'Live ' + (item.index + 1);
      btn.style.display = 'block';
      btn.style.margin = '4px 0';
      btn.onclick = () => { 
        liveIndex = item.index; 
        openLive(); 
      };
      listContent.appendChild(btn);
    });
  });

  document.getElementById('listPopup').style.display = 'block';
}

function closeList(){
  document.getElementById('listPopup').style.display = 'none';
}

function closeList(){
  document.getElementById('listPopup').style.display = 'none';
}

// --- Abonnement / Notifications ---
let subscribed=false;
function toggleSubscribe(){
  subscribed=!subscribed;
  const btn=document.getElementById('subBtn');
  btn.style.background=subscribed?'green':'#222';
  if(subscribed) requestDailyNotification();
}

function requestDailyNotification(){
  if(!("Notification" in window)) return alert("Notifications non supportées !");
  Notification.requestPermission().then(permission=>{
    if(permission==="granted") scheduleDailyNotification();
  });
}

function scheduleDailyNotification(){
  const now=new Date();
  const next=new Date();
  next.setHours(10,0,0,0);
  if(now>next) next.setDate(next.getDate()+1);
  const delay=next-now;
  setTimeout(function dailyNotif(){
    if(subscribed) new Notification("Business TV - Nouveau Live disponible !",{body:"Connectez-vous sur le site pour regarder le live",icon:DEFAULT_PROFILE});
    setTimeout(dailyNotif,24*60*60*1000);
  },delay);
}
