<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business TV</title>
<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:Arial,sans-serif;}
header{position:sticky;top:0;background:#121b2c;padding:12px 18px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.header-top{display:flex;align-items:center;gap:10px;justify-content:space-between;}
header img{width:50px;height:50px;border-radius:10px;animation:logoAnim 6s ease infinite;}
header h1{font-size:22px;font-weight:bold;background:linear-gradient(270deg,#4ea1ff,#ff4ea1,#4effa1);background-size:600% 600%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:anim 6s ease infinite;margin:0;}
@keyframes anim{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
@keyframes logoAnim{0%{transform:rotate(0deg);}50%{transform:rotate(10deg);}100%{transform:rotate(0deg);}}

.category{margin:12px 0;}
.category-header{display:flex;align-items:center;gap:10px;padding:0 10px;justify-content:space-between;}
.category-profile{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.category h2{margin:0;color:#4ea1ff;font-size:16px;}
.media-row{display:flex;gap:10px;overflow-x:auto;padding:8px;scroll-behavior: smooth;}
.media-card{min-width:180px;background:#121b2c;border-radius:12px;overflow:hidden;box-shadow:0 3px 6px rgba(0,0,0,.5);}
.player iframe,.player video,.player img,.player audio{width:100%;height:150px;border:none;object-fit:cover;}
.actions{display:flex;justify-content:space-around;padding:4px 0;flex-wrap:wrap;}
.btn{background:#0044cc;color:white;padding:4px 6px;border-radius:6px;font-size:12px;text-decoration:none;cursor:pointer;}
.btn:hover{background:#0066ff;}
.share-btn{background:#25D366;color:#fff;padding:4px 6px;border-radius:6px;font-size:12px;text-decoration:none;margin-top:4px;display:inline-block;}
.annonce-bar{overflow-x:auto;background:#0e1524;margin-top:8px;padding:6px 0;white-space:nowrap;}
.annonce-track{display:inline-flex;gap:6px;}
.annonce-btn{background:#ff4ea1;color:#fff;border:none;padding:5px 10px;border-radius:18px;font-size:12px;cursor:pointer;}

/* TICKER */
.ticker-wrapper{position:fixed;bottom:0;left:0;width:100%;background:#111;color:#fff;overflow:hidden;z-index:999;border-top:2px solid red;}
.ticker{display:inline-block;white-space:nowrap;padding-left:100%;animation:tickerMove 10s linear infinite;font-weight:bold;font-size:14px;}
@keyframes tickerMove{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* LIVE POPUP */
.live-popup{position:fixed;bottom:100px;right:18px;background:#222;padding:12px;border-radius:12px;color:#fff;z-index:9999;max-height:60vh;overflow-y:auto;display:none;}
.live-popup button{display:block;width:100%;margin-bottom:6px;background:#0044cc;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;text-align:left;}

/* BOUTONS FLOTTANTS */
.floating-btn{position:fixed;width:50px;height:50px;border-radius:50%;font-size:20px;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px #222;}
#liveBtn{bottom:18px;right:18px;background:red;color:#fff;}
#listBtn{bottom:78px;right:18px;background:#222;color:#fff;}
#subBtn{bottom:138px;right:18px;background:#222;color:#fff;}
#subBtn.active{background:green;color:#fff;}

/* OUVERT/FERMÉ */
.open-btn{padding:4px 8px;border-radius:6px;color:#fff;font-weight:bold;font-size:12px;animation:blink 1s infinite;}
.open-btn.open{background:green;}
.open-btn.closed{background:red;}
@keyframes blink{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}

/* HORLOGE ENTETE */
#clock{color:#fff;font-weight:bold;font-size:14px;}
</style>
</head>
<body>

<header>
<div class="header-top">
<div style="display:flex;align-items:center;gap:10px;">
<img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">
<h1>Business TV💫</h1>
</div>
<div id="clock"></div>
</div>

<div class="annonce-bar">
<div class="annonce-track">
<button class="annonce-btn" data-text="📢 Promo Business TV" data-phone="+237656050097,+237670035609">📢 contact admin</button>
<button class="annonce-btn" data-text="🎬 Community manager & site web" data-phone="+237656050097,+237670035609">🎬 community manager</button>
</div>
</div>
</header>

<div id="content">
<!-- --- ESPACE POUR AJOUTER LES CATEGORIES --- -->
</div>

<!-- LIVE PLAYER -->
<div id="liveTV" style="display:none;position:fixed;inset:0;background:#000;z-index:10000;">
<div style="height:50px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 12px;">
<strong style="color:red;">🔴 BUSINESS TV LIVE</strong>
<button onclick="closeLiveTV()" style="background:red;border:none;color:#fff;padding:6px 12px;border-radius:6px;">⬅ Accueil</button>
</div>
<div id="livePlayer" style="width:100%;height:calc(100% - 50px);background-size:cover;background-position:center;"></div>
<div style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:20px;">
<button onclick="prevLive()">⏮ Précédent</button>
<button onclick="nextLive()">⏭ Suivant</button>
</div>
</div>

<div class="live-popup" id="livePopup"></div>

<!-- BOUTONS FLOTTANTS -->
<div id="liveBtn" class="floating-btn">▶</div>
<div id="listBtn" class="floating-btn">📋</div>
<div id="subBtn" class="floating-btn">🔔</div>

<!-- POPUP ANNONCES -->
<div id="annoncePopup" style="
position:fixed;inset:0;background:rgba(0,0,0,0.7);
display:none;align-items:center;justify-content:center;z-index:100000;">
  <div style="background:#121b2c;padding:20px;border-radius:15px;width:90%;max-width:320px;text-align:center;">
    <p id="annonceText" style="margin-bottom:15px;"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <a id="annonceCall" style="background:#0066ff;padding:8px 12px;border-radius:8px;text-decoration:none;color:white;">📞 Appeler</a>
      <a id="annonceWA" target="_blank" style="background:green;padding:8px 12px;border-radius:8px;text-decoration:none;color:white;">💬 WhatsApp</a>
    </div>
    <div style="margin-top:12px;">
      <button onclick="closeAnnonce()" style="background:red;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">❌ Fermer</button>
    </div>
  </div>
</div>

<!-- TICKER / BANDE ANNONCE -->
<div class="ticker-wrapper">
  <div class="ticker">🔴 BUSINESS TV LIVE • Promotion gratuite • Contact WhatsApp 670035609 •</div>
</div>

<script>
const SITE_LINK="https://business-tv.vercel.app/";
const DEFAULT_PROFILE="https://raw.githubusercontent.com/Lfg237/m-dias/main/InShot_20260228_180947307.jpg";

// --- POPUP ANNONCES ---
const annoncePopup=document.getElementById("annoncePopup");
const annonceText=document.getElementById("annonceText");
const annonceCall=document.getElementById("annonceCall");
const annonceWA=document.getElementById("annonceWA");

// bouton cloche pour notifications WhatsApp
const subBtn = document.getElementById("subBtn");
const WHATSAPP_NUMS=["+237656050097","+237670035609"];

subBtn.onclick = () => {
    WHATSAPP_NUMS.forEach(num=>{
        const text="🔔 Business TV: Nouveaux médias à découvrir! "+SITE_LINK;
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(text)}`,'_blank');
    });
    alert("✅ Notifications WhatsApp envoyées à tous les numéros enregistrés !");
};

// --- ANNOUNCE BUTTON ---
document.querySelectorAll(".annonce-btn").forEach(btn=>{
    btn.addEventListener("click", function(){
        const text = this.dataset.text;
        const phones = this.dataset.phone.split(",");
        annonceText.innerText = text;
        annonceCall.href = "tel:"+phones[0];
        annonceWA.href = "https://wa.me/"+phones[0]+"?text="+encodeURIComponent(text+" 🔴 Voir sur Business TV: "+SITE_LINK);
        annoncePopup.style.display="flex";
    });
});

function closeAnnonce(){annoncePopup.style.display="none";}

// --- HORLOGE ---
function updateClock(){
    const now=new Date();
    const h=String(now.getHours()).padStart(2,'0');
    const m=String(now.getMinutes()).padStart(2,'0');
    const s=String(now.getSeconds()).padStart(2,'0');
    document.getElementById("clock").innerText=`🕒 ${h}:${m}:${s}`;
}
setInterval(updateClock,1000);
updateClock();
</script>
</body>
</html>
